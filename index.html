<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Layer 2 — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Inter:wght@400;500;600&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="layout">
    <main id="reader" class="reader" aria-label="reader"></main>
    <aside id="dashboard" class="dashboard" aria-label="signal dashboard"></aside>
  </div>

  <div id="toolbar" class="toolbar" aria-label="tools"></div>

  <!-- Global SVG layer for ink that flows past text bounds -->
  <svg id="ink-layer" class="ink-layer" xmlns="http://www.w3.org/2000/svg"></svg>

  <!-- Floating annotation textarea host (one at a time) -->
  <div id="annotation-host"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
